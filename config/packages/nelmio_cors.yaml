nelmio_cors:
    defaults:
        allow_credentials: true
        allow_origin: ['%env(FRONTEND_URL)%']
        allow_headers: ['Content-Type', 'Authorization']
        allow_methods: ['POST', 'GET', 'OPTIONS', 'PUT', 'DELETE']
        expose_headers: ['Authorization']
        max_age: 3600

    paths:
        '^/':
            allow_origin: ['%env(FRONTEND_URL)%']
            allow_headers: ['Content-Type', 'Authorization']
            allow_methods: ['POST', 'GET', 'OPTIONS', 'PUT', 'DELETE']
            max_age: 3600